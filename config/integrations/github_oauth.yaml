name: "GitHub"
description: "Connect to GitHub via OAuth to fetch User Stats and API Rate Limit Quotas."

flow:
    # 第一步：OAuth 授权获取 Token
    - id: auth
      use: oauth
      args:
          auth_url: "https://github.com/login/oauth/authorize"
          token_url: "https://github.com/login/oauth/access_token"
          doc_url: "https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/creating-an-oauth-app"
          scopes: ["read:user"]
          token_request_type: "json"
      outputs:
          access_token: "access_token"
      secrets:
          access_token: "access_token" # 存储 token 到 SecretsController

    # 第二步：获取 API 调用额度 (Rate Limit)
    - id: fetch_rate_limit
      use: http
      args:
          url: "https://api.github.com/rate_limit"
          method: "GET"
          headers:
              Authorization: "Bearer {access_token}"
              Accept: "application/vnd.github.v3+json"
      outputs:
          http_response: "rate_limit_response"

    # 第三步：提取 Core API 的额度对象
    - id: parse_rate_limit
      use: extract
      args:
          source: "{rate_limit_response}"
          type: "jsonpath"
          expr: "$.resources.core"
      outputs:
          core_limit: "core_limit"

    # 第四步：获取用户基础信息
    - id: fetch_user
      use: http
      args:
          url: "https://api.github.com/user"
          method: "GET"
          headers:
              Authorization: "Bearer {access_token}"
              Accept: "application/vnd.github.v3+json"
      outputs:
          http_response: "user_response"

    # 第五步：提取用户数据
    - id: parse_user
      use: extract
      args:
          source: "{user_response}"
          type: "jsonpath"
          expr: "$"
      outputs:
          user_data: "user_data"

templates:
    # 视图模板 1：API 额度监控 (包含进度条和核心大数字)
    - label: "GitHub API Rate Limit"
      type: "source_card"
      ui:
          title: "GitHub API Quota"
          icon: "🐙"
      widgets:
          - type: "progress_bar"
            title: "Core API Request"
            usage: "{core_limit.used}"
            limit: "{core_limit.limit}"
            color_thresholds:
                warning_percent: 75
                critical_percent: 90

          - type: "hero_metric"
            amount: "{core_limit.remaining}"
            label: "Remaining Requests"

    # 视图模板 2：用户基础数据 (包含 Key-Value 的统计网格)
    - label: "GitHub User Stats"
      type: "source_card"
      ui:
          title: "GitHub Profile Stats"
          icon: "👤"
      widgets:
          - type: "key_value_grid"
            items:
                "Followers": "{user_data.followers}"
                "Following": "{user_data.following}"
                "Public Repos": "{user_data.public_repos}"
                "Gists": "{user_data.public_gists}"
