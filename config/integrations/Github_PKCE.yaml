name: "GitHub PKCE Auth"
description: "OAuth authorization code flow with PKCE using GitHub as an example."
flow:
    - id: authorize
      use: oauth
      args:
          oauth_flow: "code"
          auth_url: "https://github.com/login/oauth/authorize"
          token_url: "https://github.com/login/oauth/access_token"
          scopes: ["repo", "user"]
          doc_url: "https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/authorizing-oauth-apps"
          client_id: "Ov23ctVAAmvFxqWhtwB0" # 请在此填入 GitHub OAuth App 的 Client ID
          client_secret: "" # 若 GitHub App 支持不带 secret 的 PKCE 这里可留空
          supports_pkce: true
          token_request_type: "json" # GitHub requires JSON token request to get JSON response
      secrets:
          oauth_secrets: "oauth_secrets"
    - id: fetch_user
      use: http
      args:
          url: "https://api.github.com/user"
          method: "GET"
          headers:
              Authorization: "token {oauth_secrets.access_token}"
              Accept: "application/vnd.github.v3+json"
      outputs:
          http_response: "user_payload"
    - id: parse_login
      use: extract
      args:
          source: "{user_payload}"
          type: "jsonpath"
          expr: "$.login"
      outputs:
          login: "login"
    - id: parse_name
      use: extract
      args:
          source: "{user_payload}"
          type: "jsonpath"
          expr: "$.name"
      outputs:
          name: "name"
    - id: parse_followers
      use: extract
      args:
          source: "{user_payload}"
          type: "jsonpath"
          expr: "$.followers"
      outputs:
          followers: "followers"
templates:
    - id: "github_pkce_snapshot"
      type: "source_card"
      ui:
          title: "GitHub PKCE Session"
          icon: "GitHub"
      widgets:
          - type: "Container"
            spacing: "small"
            items:
                - type: "ColumnSet"
                  columns:
                      - type: "Column"
                        width: "stretch"
                        items:
                            - type: "TextBlock"
                              text: "{name}"
                              size: "large"
                              weight: "semibold"
                              max_lines: 1
                            - type: "TextBlock"
                              text: "@{login}"
                              color: "muted"
                              size: "small"
                      - type: "Column"
                        width: "auto"
                        verticalAlignment: "top"
                        items:
                            - type: "Badge"
                              text: "PKCE Flow"
                              color: "info"
                - type: "FactSet"
                  spacing: "compact"
                  facts:
                      - label: "Followers"
                        value: "{followers}"
                      - label: "Client ID"
                        value: "{client_id}"
