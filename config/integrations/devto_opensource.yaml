name: "DEV.to Open Source Feed"
description: "Fetch latest DEV.to posts focused on technology and open source."
flow:
    - id: fetch_articles
      use: http
      args:
          url: "https://dev.to/api/articles?tag=opensource&per_page=5"
          method: "GET"
      outputs:
          articles_payload: "http_response"
templates:
    - id: "devto_oss_snapshot"
      type: "source_card"
      ui:
          title: "DEV.to OSS Latest"
          icon: "DEV"
      widgets:
          - type: "Container"
            spacing: "sm"
            items:
                - type: "List"
                  data_source: "{articles_payload}"
                  item_alias: "article"
                  spacing: "sm"
                  limit: 5
                  render:
                      - type: "ColumnSet"
                        columns:
                            - type: "Column"
                              spacing: "sm"
                              width: "stretch"
                              items:
                                  - type: "TextBlock"
                                    text: "{article.title}"
                                    size: "md"
                                    weight: "semibold"
                                    max_lines: 1
                                  - type: "TextBlock"
                                    text: "{article.user.name}"
                                    tone: "muted"
                                    size: "sm"
                                    max_lines: 1
                            - type: "Column"
                              width: "auto"
                              align_y: "center"
                              items:
                                  - type: "ActionSet"
                                    align_x: "end"
                                    actions:
                                        - type: "Action.OpenUrl"
                                          title: "Read"
                                          url: "{article.url}"
                                          size: "md"
