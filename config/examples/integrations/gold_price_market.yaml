name: "Gold Token Price"
description: "Fetch real-time crypto gold token spot price (PAXG) from CoinGecko."
flow:
    - id: fetch_gold
      use: http
      args:
          url: "https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd"
          method: "GET"
      outputs:
          spot_payload: "http_response"
    - id: parse_paxg
      use: extract
      args:
          source: "{spot_payload}"
          type: "jsonpath"
          expr: "$['pax-gold'].usd"
      outputs:
          paxg_price: "$['pax-gold'].usd"
templates:
    - id: "gold_market_snapshot"
      type: "source_card"
      ui:
          title: "Real-time Gold Price"
          icon: "GLD"
      widgets:
          - type: "Container"
            spacing: "sm"
            items:
                - type: "TextBlock"
                  text: "${fixed(paxg_price, 2)}"
                  size: "xl"
                  weight: "bold"
                - type: "TextBlock"
                  text: "PAX Gold (USD)"
                  tone: "muted"
                  size: "sm"
