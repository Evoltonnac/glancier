name: CI

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

jobs:
    backend-core:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install backend dependencies
              run: pip install -r requirements.txt

            - name: Run backend core suite
              run: bash scripts/test_backend_core.sh

    frontend-core:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: pnpm
                  cache-dependency-path: ui-react/pnpm-lock.yaml

            - name: Enable Corepack
              run: corepack enable

            - name: Install frontend dependencies
              run: pnpm --dir ui-react install --frozen-lockfile

            - name: Run frontend core suite
              run: bash scripts/test_frontend_core.sh

            - name: Run frontend typecheck
              run: pnpm --dir ui-react run typecheck

    create-release:
        if: github.event_name == 'workflow_dispatch'
        needs:
            - backend-core
            - frontend-core
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            version: ${{ steps.get_version.outputs.VERSION }}
            tag: ${{ steps.release_meta.outputs.TAG }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Get version
              id: get_version
              run: |
                  VERSION=$(node -p "require('./ui-react/package.json').version")
                  echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Ensure GitHub Release
              id: release_meta
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  TAG="v${{ steps.get_version.outputs.VERSION }}"
                  echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

                  if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
                    echo "Release $TAG already exists."
                  else
                    gh release create "$TAG" \
                      --title "Glanceus v${{ steps.get_version.outputs.VERSION }}" \
                      --notes "Automated release for Glanceus v${{ steps.get_version.outputs.VERSION }}." \
                      --draft \
                      --repo "${{ github.repository }}"
                  fi

    release-tauri:
        if: github.event_name == 'workflow_dispatch'
        needs:
            - create-release
        permissions:
            contents: write
        env:
            TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - job_id: macos-aarch64
                      platform: macos-15
                      rust_target: aarch64-apple-darwin
                      tauri_args: --bundles app,dmg --target aarch64-apple-darwin
                      updater_platform_key: darwin-aarch64
                      updater_glob: "*.app.tar.gz"
                      arch_label: aarch64
                    - job_id: macos-x86_64
                      platform: macos-15-intel
                      rust_target: x86_64-apple-darwin
                      tauri_args: --bundles app,dmg --target x86_64-apple-darwin
                      updater_platform_key: darwin-x86_64
                      updater_glob: "*.app.tar.gz"
                      arch_label: x86_64
                    - job_id: windows-x86_64
                      platform: windows-latest
                      rust_target: x86_64-pc-windows-msvc
                      tauri_args: --bundles nsis --target x86_64-pc-windows-msvc
                      updater_platform_key: windows-x86_64
                      updater_glob: "*.nsis.zip"
                      updater_glob_fallback: "*.exe"
                      arch_label: x86_64
                    # - job_id: linux-x86_64
                    #   platform: ubuntu-22.04
                    #   rust_target: x86_64-unknown-linux-gnu
                    #   tauri_args: --bundles appimage,deb,rpm --target x86_64-unknown-linux-gnu
                    #   updater_platform_key: linux-x86_64
                    #   updater_glob: "*.AppImage"
                    #   arch_label: x86_64
                    # - job_id: linux-aarch64
                    #   platform: ubuntu-22.04-arm
                    #   rust_target: aarch64-unknown-linux-gnu
                    #   tauri_args: --bundles appimage,deb,rpm --target aarch64-unknown-linux-gnu
                    #   updater_platform_key: linux-aarch64
                    #   updater_glob: "*.AppImage"
                    #   arch_label: aarch64
        runs-on: ${{ matrix.platform }}
        defaults:
            run:
                shell: bash
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: pnpm
                  cache-dependency-path: ui-react/pnpm-lock.yaml

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.rust_target }}

            - name: Install Linux build dependencies
              if: runner.os == 'Linux'
              run: |
                  set -euxo pipefail
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                    build-essential \
                    pkg-config \
                    libssl-dev \
                    libgtk-3-dev \
                    librsvg2-dev \
                    libayatana-appindicator3-dev \
                    libwebkit2gtk-4.1-dev \
                    libsoup-3.0-dev \
                    patchelf \
                    xdg-utils \
                    file \
                    curl

            - name: Install backend dependencies
              run: pip install -r requirements.txt

            - name: Install frontend dependencies
              run: pnpm --dir ui-react install --frozen-lockfile

            - name: Validate updater signing secrets
              run: |
                  if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
                    echo "Missing TAURI_SIGNING_PRIVATE_KEY secret."
                    exit 1
                  fi
                  if [[ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]]; then
                    echo "Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret."
                    exit 1
                  fi

            - name: Run release prebuild script
              env:
                  SKIP_TAURI_BUILD: "1"
              run: bash scripts/build.sh --prepare-only

            - name: Build Tauri app
              run: pnpm --dir ui-react run tauri build -- ${{ matrix.tauri_args }}

            - name: Prepare release assets directory
              run: mkdir -p release-assets updater-metadata

            - name: Prepare macOS installer asset
              if: runner.os == 'macOS'
              run: |
                  set -euo pipefail
                  DMG_DIR="ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg"
                  DMG_PATH=$(find "$DMG_DIR" -name "*.dmg" -type f -print -quit)
                  if [[ -z "$DMG_PATH" ]]; then
                    echo "Missing macOS DMG artifact under $DMG_DIR"
                    exit 1
                  fi
                  RELEASE_TAG="${{ needs.create-release.outputs.tag }}"
                  ASSET_NAME="Glanceus-${RELEASE_TAG}-macos-${{ matrix.arch_label }}.dmg"
                  cp "$DMG_PATH" "release-assets/$ASSET_NAME"

            - name: Prepare Linux installer assets
              if: runner.os == 'Linux'
              run: |
                  set -euo pipefail
                  BUNDLE_DIR="ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle"
                  RELEASE_TAG="${{ needs.create-release.outputs.tag }}"
                  APPIMAGE_PATH=$(find "$BUNDLE_DIR" -name "*.AppImage" -type f -print -quit)
                  if [[ -n "$APPIMAGE_PATH" ]]; then
                    cp "$APPIMAGE_PATH" "release-assets/Glanceus-${RELEASE_TAG}-linux-${{ matrix.arch_label }}.AppImage"
                  fi
                  DEB_PATH=$(find "$BUNDLE_DIR" -name "*.deb" -type f -print -quit)
                  if [[ -n "$DEB_PATH" ]]; then
                    cp "$DEB_PATH" "release-assets/Glanceus-${RELEASE_TAG}-linux-${{ matrix.arch_label }}.deb"
                  fi
                  RPM_PATH=$(find "$BUNDLE_DIR" -name "*.rpm" -type f -print -quit)
                  if [[ -n "$RPM_PATH" ]]; then
                    cp "$RPM_PATH" "release-assets/Glanceus-${RELEASE_TAG}-linux-${{ matrix.arch_label }}.rpm"
                  fi

            - name: Prepare Windows installer asset
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  $releaseTag = '${{ needs.create-release.outputs.tag }}'
                  $nsisDir = "ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis"
                  $exe = Get-ChildItem -Path $nsisDir -Recurse -Include *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
                  if ($null -eq $exe) {
                    throw "Missing Windows NSIS artifact under $nsisDir"
                  }
                  $dest = "release-assets/Glanceus-$releaseTag-windows-${{ matrix.arch_label }}-setup.exe"
                  Copy-Item $exe.FullName $dest

            - name: Prepare updater asset + metadata
              run: |
                  set -euo pipefail
                  RELEASE_TAG="${{ needs.create-release.outputs.tag }}"
                  BUNDLE_DIR="ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle"
                  UPDATER_ARCHIVE_PATH=$(find "$BUNDLE_DIR" -name "${{ matrix.updater_glob }}" -type f -print -quit)
                  if [[ -z "$UPDATER_ARCHIVE_PATH" ]] && [[ -n "${{ matrix.updater_glob_fallback || '' }}" ]]; then
                    UPDATER_ARCHIVE_PATH=$(find "$BUNDLE_DIR" -name "${{ matrix.updater_glob_fallback || '' }}" -type f -print -quit)
                  fi
                  if [[ -z "$UPDATER_ARCHIVE_PATH" ]]; then
                    echo "Missing updater archive for ${{ matrix.updater_platform_key }} in $BUNDLE_DIR"
                    exit 1
                  fi

                  UPDATER_SIG_PATH="${UPDATER_ARCHIVE_PATH}.sig"
                  if [[ ! -f "$UPDATER_SIG_PATH" ]]; then
                    echo "Missing updater signature: $UPDATER_SIG_PATH"
                    exit 1
                  fi

                  ARCHIVE_BASENAME=$(basename "$UPDATER_ARCHIVE_PATH")
                  if [[ "$ARCHIVE_BASENAME" == *.tar.gz ]]; then
                    EXT=".tar.gz"
                  else
                    EXT=".${ARCHIVE_BASENAME##*.}"
                  fi

                  UPDATER_ASSET_NAME="Glanceus-${RELEASE_TAG}-updater-${{ matrix.updater_platform_key }}${EXT}"
                  UPDATER_SIG_ASSET_NAME="${UPDATER_ASSET_NAME}.sig"
                  cp "$UPDATER_ARCHIVE_PATH" "release-assets/$UPDATER_ASSET_NAME"
                  cp "$UPDATER_SIG_PATH" "release-assets/$UPDATER_SIG_ASSET_NAME"

                  export METADATA_PATH="updater-metadata/${{ matrix.updater_platform_key }}.json"
                  export PLATFORM_KEY="${{ matrix.updater_platform_key }}"
                  export UPDATER_ASSET_NAME
                  export UPDATER_SIG_PATH
                  python - <<'PY'
                  import json
                  import os

                  with open(os.environ["UPDATER_SIG_PATH"], "r", encoding="utf-8") as f:
                      signature = f.read().strip()

                  payload = {
                      "platform_key": os.environ["PLATFORM_KEY"],
                      "asset_name": os.environ["UPDATER_ASSET_NAME"],
                      "signature": signature,
                  }

                  with open(os.environ["METADATA_PATH"], "w", encoding="utf-8") as f:
                      json.dump(payload, f, indent=2, ensure_ascii=False)
                      f.write("\n")
                  PY

            - name: Upload packaged release assets
              uses: actions/upload-artifact@v4
              with:
                  name: release-assets-${{ matrix.job_id }}
                  path: release-assets/*
                  if-no-files-found: error

            - name: Upload updater metadata
              uses: actions/upload-artifact@v4
              with:
                  name: updater-metadata-${{ matrix.job_id }}
                  path: updater-metadata/*.json
                  if-no-files-found: error

    publish-release:
        if: github.event_name == 'workflow_dispatch'
        needs:
            - create-release
            - release-tauri
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download built release assets
              uses: actions/download-artifact@v4
              with:
                  pattern: release-assets-*
                  path: release-assets
                  merge-multiple: true

            - name: List downloaded release assets
              run: ls -la release-assets

            - name: Upload assets to GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release upload "${{ needs.create-release.outputs.tag }}" release-assets/* --clobber --repo "${{ github.repository }}"

    assemble-latest-json:
        if: github.event_name == 'workflow_dispatch'
        needs:
            - create-release
            - release-tauri
            - publish-release
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download updater metadata
              uses: actions/download-artifact@v4
              with:
                  pattern: updater-metadata-*
                  path: updater-metadata
                  merge-multiple: true

            - name: Build latest.json
              env:
                  RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
                  RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
                  RELEASE_REPOSITORY: ${{ github.repository }}
              run: |
                  export META_DIR="updater-metadata"
                  export OUT_PATH="$RUNNER_TEMP/latest.json"
                  python - <<'PY'
                  import json
                  import os
                  from datetime import datetime, timezone
                  from pathlib import Path

                  required_platforms = [
                      "darwin-aarch64",
                      "darwin-x86_64",
                      "windows-x86_64",
                  ]

                  meta_dir = Path(os.environ["META_DIR"])
                  metadata_files = sorted(meta_dir.glob("*.json"))
                  if not metadata_files:
                      raise SystemExit(f"No updater metadata found in {meta_dir}")

                  by_platform = {}
                  for meta_file in metadata_files:
                      with meta_file.open("r", encoding="utf-8") as f:
                          payload = json.load(f)
                      by_platform[payload["platform_key"]] = payload

                  missing = [p for p in required_platforms if p not in by_platform]
                  if missing:
                      raise SystemExit(f"Missing updater metadata for: {', '.join(missing)}")

                  version = os.environ["RELEASE_VERSION"]
                  tag = os.environ["RELEASE_TAG"]
                  repo = os.environ["RELEASE_REPOSITORY"]
                  base_url = f"https://github.com/{repo}/releases/download/{tag}"

                  platforms = {}
                  for platform in required_platforms:
                      entry = by_platform[platform]
                      platforms[platform] = {
                          "signature": entry["signature"],
                          "url": f"{base_url}/{entry['asset_name']}",
                      }

                  latest = {
                      "version": version,
                      "notes": f"Automated release for Glanceus v{version}.",
                      "pub_date": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
                      "platforms": platforms,
                  }

                  with open(os.environ["OUT_PATH"], "w", encoding="utf-8") as f:
                      json.dump(latest, f, indent=2, ensure_ascii=False)
                      f.write("\n")
                  PY

            - name: Upload latest.json
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release upload "${{ needs.create-release.outputs.tag }}" "$RUNNER_TEMP/latest.json#latest.json" --clobber --repo "${{ github.repository }}"
