name: CI

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

jobs:
    backend-core:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install backend dependencies
              run: pip install -r requirements.txt

            - name: Run backend core suite
              run: bash scripts/test_backend_core.sh

    frontend-core:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: ui-react/package-lock.json

            - name: Install frontend dependencies
              working-directory: ui-react
              run: npm ci

            - name: Run frontend core suite
              run: bash scripts/test_frontend_core.sh

            - name: Run frontend typecheck
              working-directory: ui-react
              run: npm run typecheck

    release-tauri:
        if: github.event_name == 'workflow_dispatch'
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-15
                      rust_target: aarch64-apple-darwin
                      tauri_args: --bundles app --target aarch64-apple-darwin
                      app_name: Glanceus
                    - platform: macos-15-intel
                      rust_target: x86_64-apple-darwin
                      tauri_args: --bundles app --target x86_64-apple-darwin
                      app_name: Glanceus
                    - platform: windows-latest
                      rust_target: x86_64-pc-windows-msvc
                      tauri_args: --bundles nsis --target x86_64-pc-windows-msvc
        runs-on: ${{ matrix.platform }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: ui-react/package-lock.json

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.rust_target }}

            - name: Install backend dependencies
              run: pip install -r requirements.txt

            - name: Install frontend dependencies
              working-directory: ui-react
              run: npm ci

            - name: Get version
              id: get_version
              shell: bash
              run: |
                  VERSION=$(node -p "require('./ui-react/package.json').version")
                  echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
                  echo "VERSION=$VERSION"

            - name: Create GitHub Release
              if: matrix.platform == 'macos-15'
              run: |
                  gh release create "v${{ steps.get_version.outputs.VERSION }}" \
                      --title "Glanceus v${{ steps.get_version.outputs.VERSION }}" \
                      --notes "Automated release for Glanceus v${{ steps.get_version.outputs.VERSION }}." \
                      --draft true \
                      --repo ${{ github.repository }}

            - name: Run release prebuild script
              shell: bash
              env:
                  SKIP_TAURI_BUILD: "1"
              run: bash scripts/build.sh --prepare-only

            - name: Build Tauri app
              working-directory: ui-react
              run: |
                  npm run tauri build -- ${{ matrix.tauri_args }}

            - name: Codesign and Staple (Ad-Hoc)
              if: matrix.platform == 'macos-15' || matrix.platform == 'macos-15-intel'
              run: |
                  # Find the .app bundle in the bundle directory
                  APP_PATH=$(find "ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos" -name "*.app" -type d | head -1)
                  echo "Signing app at: $APP_PATH"

                  # Ad-Hoc sign
                  codesign --force --deep -s - "$APP_PATH"

                  # Staple the signature
                  xcrun stapler staple "$APP_PATH"

                  echo "Code signing complete"

            - name: Create DMG from signed app
              if: matrix.platform == 'macos-15' || matrix.platform == 'macos-15-intel'
              run: |
                  APP_PATH=$(find "ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos" -name "*.app" -type d | head -1)
                  DMG_NAME="${{ matrix.app_name }}.dmg"
                  DMG_PATH="ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/$DMG_NAME"

                  # Create DMG from signed app
                  hdiutil create -volname "${{ matrix.app_name }}" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"

                  echo "DMG created at: $DMG_PATH"

            - name: Upload Release Asset
              if: matrix.platform == 'macos-15' || matrix.platform == 'macos-15-intel'
              run: |
                  DMG_PATH=$(find ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg -name "*.dmg" | head -1)
                  echo "DMG path: $DMG_PATH"

                  # Upload using GitHub CLI
                  gh release upload "v${{ steps.get_version.outputs.VERSION }}" "$DMG_PATH" --repo ${{ github.repository }}

            - name: Upload Windows Release Asset
              if: matrix.platform == 'windows-latest'
              run: |
                  NSIS_PATH=$(find ui-react/src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis -name "*.exe" | head -1)
                  echo "NSIS path: $NSIS_PATH"

                  # Upload using GitHub CLI
                  gh release upload "v${{ steps.get_version.outputs.VERSION }}" "$NSIS_PATH" --repo ${{ github.repository }}
