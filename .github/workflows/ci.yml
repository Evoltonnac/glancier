name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  backend-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend core suite
        run: bash scripts/test_backend_core.sh

  frontend-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui-react/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui-react
        run: npm ci

      - name: Run frontend core suite
        run: bash scripts/test_frontend_core.sh

      - name: Run frontend typecheck
        working-directory: ui-react
        run: npm run typecheck

  release-tauri:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            rust_target: aarch64-apple-darwin
            tauri_args: --bundles dmg --target aarch64-apple-darwin
          - platform: macos-13
            rust_target: x86_64-apple-darwin
            tauri_args: --bundles dmg --target x86_64-apple-darwin
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: --bundles nsis --target x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui-react/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: ui-react
        run: npm ci

      - name: Get version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./ui-react/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Run release prebuild script
        shell: bash
        env:
          SKIP_TAURI_BUILD: "1"
        run: bash scripts/build.sh --prepare-only

      - name: Build and publish Tauri release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ui-react
          args: ${{ matrix.tauri_args }}
          tagName: v${{ steps.get_version.outputs.VERSION }}
          releaseName: "Glancier v${{ steps.get_version.outputs.VERSION }}"
          releaseBody: "Automated release for Glancier v${{ steps.get_version.outputs.VERSION }}."
          releaseDraft: true
          prerelease: false
